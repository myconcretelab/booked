name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release, for example 0.3.14 or v0.3.14"
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    name: Publish GitHub release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Prepare release metadata
        id: meta
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_VERSION: ${{ inputs.version }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            raw_version="$INPUT_VERSION"
          else
            raw_version="${REF_NAME#v}"
          fi

          version="${raw_version#v}"
          tag="v${version}"

          if ! [[ "$version" =~ ^[0-9]+(\.[0-9]+){2}([.-][0-9A-Za-z.-]+)?$ ]]; then
            echo "Version must look like 0.3.14 or v0.3.14." >&2
            exit 1
          fi

          header_version="$(sed -nE 's/^[[:space:]]*\*[[:space:]]*Version:[[:space:]]*([^[:space:]]+).*/\1/p' booked.php | head -n 1)"
          const_version="$(sed -nE "s/^define\('BOOKED_VERSION',[[:space:]]*'([^']+)'\);/\1/p" booked.php | head -n 1)"

          if [ "$header_version" != "$version" ] || [ "$const_version" != "$version" ]; then
            echo "booked.php version mismatch." >&2
            echo "Requested: ${version}" >&2
            echo "Plugin header: ${header_version}" >&2
            echo "BOOKED_VERSION: ${const_version}" >&2
            exit 1
          fi

          if [ "$EVENT_NAME" != "workflow_dispatch" ] && [ "$REF_NAME" != "$tag" ]; then
            echo "Tag ${REF_NAME} does not match booked.php version ${version}." >&2
            exit 1
          fi

          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"

      - name: Create tag for manual release
        if: github.event_name == 'workflow_dispatch'
        shell: bash
        run: |
          set -euo pipefail

          tag="${{ steps.meta.outputs.tag }}"
          git fetch --tags origin

          if git rev-parse "${tag}^{commit}" >/dev/null 2>&1; then
            tag_commit="$(git rev-parse "${tag}^{commit}")"
            head_commit="$(git rev-parse HEAD)"

            if [ "$tag_commit" != "$head_commit" ]; then
              echo "Tag ${tag} already exists but does not point to this commit." >&2
              exit 1
            fi

            echo "Tag ${tag} already exists on this commit."
            exit 0
          fi

          git tag "$tag"
          git push origin "$tag"

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: Booked ${{ steps.meta.outputs.version }}
          generate_release_notes: true
